# Aria2 Configuration File
# Generated: November 4, 2025

# Continue downloading a partially downloaded file
continue=true

# Maximum number of connections to one server for each download
max-connection-per-server=16

# Split download into multiple segments
split=64

# Minimum size of each split when splitting downloads
min-split-size=1M

# File allocation method (none = sparse allocation for faster downloads)
file-allocation=none

